<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datorernas utveckling</title>
    <link rel="stylesheet" href="Bildhantering.css">
</head>

<!-- SESSIONSPLANERING - LEKTION 3
Dagens mål: Bygga grundlayout
Teknisk utmaning: Grid + responsiv design
Bildhantering-fokus: Optimera bilder
CSS-tekniker: Grid, flexbox
Problem från förra gången: -
Kvalitetsmål: Fungerande layout
-->

<body>

<header>
    <h1>Datorernas utveckling</h1>
    <nav>
        <a href="#">Hem</a>
        <a href="#">Gamla</a>
        <a href="#">Moderna</a>
    </nav>
</header>

<main>

<section class="hero">
    <h1> Datorer genom tiden</h1>
</section>

<section>
    <h2>Gamla datorer</h2>
    <div class="grid">
        <img src="The Apple II.jpg" alt="Gammal dator">
        <img src="Commodore 64.jpg" alt="Gammal dator">
        <img src="Desktop.jpg" alt="Gammal dator">
    </div>
</section>

<section>
    <h2>Moderna datorer</h2>
    <div class="grid">
        <img src="Cheap Computer.jpg" alt="Modern dator">
        <img src="iMac.jpg" alt="Modern dator">
        <img src="ROG Tytan.jpg" alt="Modern dator">
    </div>
</section>

<article class="jobs">
    <img src="steve-jobs.jpg" alt="Steve Jobs">
    <div>
        <h2>Steve Jobs</h2>
        <p>Steve Jobs var en av de viktigaste personerna inom modern teknik och datorutveckling.</p>
    </div>
</article>

</main>

<footer>
    <p>Projekt - Bildhantering</p>
</footer>

</body>
</html>
